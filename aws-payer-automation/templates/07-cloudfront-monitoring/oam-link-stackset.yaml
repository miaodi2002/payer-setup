AWSTemplateFormatVersion: '2010-09-09'
Description: "OAM Link template for member accounts - deployed via StackSet from Payer account"

Parameters:
  OAMSinkArn:
    Type: String
    Description: "ARN of the OAM Sink in the Payer account"
  PayerName:
    Type: String
    Description: "Name of the Payer (used for naming resources)"

Resources:
  # OAM Link to send CloudWatch metrics to Payer account.
  # LinkConfiguration.MetricConfiguration.Filter is intentionally omitted:
  # OAM rejects the JSON-object filter form with "Invalid request provided:
  # AWS::Oam::Link". The alert Lambda already filters by namespace at query
  # time, so sharing all CloudWatch metrics is acceptable.
  CloudFrontOAMLink:
    Type: AWS::Oam::Link
    Properties:
      LabelTemplate: !Sub "${PayerName}-member-${AWS::AccountId}"
      ResourceTypes:
        - "AWS::CloudWatch::Metric"
      SinkIdentifier: !Ref OAMSinkArn
      # AWS::Oam::Link Tags is a Map (key-value object), NOT the standard
      # CFN [{Key,Value}] list. Using list form causes StackSet instances
      # to fail with: "#/Tags: expected type: JSONObject, found: JSONArray".
      Tags:
        Name: !Sub "${PayerName}-CloudFront-OAM-Link"
        Purpose: "CloudFront monitoring for cost control"
        PayerName: !Ref PayerName
        ManagedBy: "AWS Payer Automation"

Outputs:
  OAMLinkArn:
    Description: "ARN of the created OAM Link"
    Value: !GetAtt CloudFrontOAMLink.Arn
    Export:
      Name: !Sub "${AWS::StackName}-OAMLinkArn"
  
  AccountId:
    Description: "Account ID where this OAM Link is deployed"
    Value: !Ref AWS::AccountId
    Export:
      Name: !Sub "${AWS::StackName}-AccountId"
      
  LinkLabel:
    Description: "Label of the OAM Link"
    Value: !GetAtt CloudFrontOAMLink.Label
    Export:
      Name: !Sub "${AWS::StackName}-LinkLabel"